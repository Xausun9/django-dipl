{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block content %}
<h1>Sign In</h1>
<form action="{% url 'users:login' %}" method="post">
    {% csrf_token %}
    <p>
        {{ form.username.label }}<br>
        {{ form.username }}
    </p>
    <p>
        {{ form.password.label }}<br>
        {{ form.password }}
    </p>
    <p>{{ form.remember_me }} {{ form.remember_me.label }}</p>
    <p><input type="submit" value="Sign In"></p>
</form>
{% endblock %}
